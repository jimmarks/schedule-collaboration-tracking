    <script>
        jQuery(document).ready(function($) {
            // Update total display
            function updateTotal() {
                const interval = $('input[name="interval"]:checked').val();
                const addonQty = parseInt($('#addon_quantity').val());
                
                let basePrice = interval === 'month' ? 5.99 : 59.90;
                let addonPrice = interval === 'month' ? 2.00 : 20.00;
                let total = basePrice + (addonQty * addonPrice);
                let period = interval === 'month' ? '/month' : '/year';
                
                $('#total-amount').text('$' + total.toFixed(2) + period);
            }
            
            // Update on change
            $('input[name="interval"], #addon_quantity').on('change', updateTotal);
            updateTotal();
            
            // Form submission
            $('#ftt-signup-form').on('submit', function(e) {
                e.preventDefault();
                
                const $btn = $('#submit-btn');
                const $error = $('#error-message');
                
                $btn.prop('disabled', true).text('Creating account...');
                $error.hide();
                
                const formData = {
                    email: $('#email').val(),
                    name: $('#name').val(),
                    password: $('#password').val(),
                    interval: $('input[name="interval"]:checked').val(),
                    addon_quantity: parseInt($('#addon_quantity').val())
                };
                
                // Use relative URL - works on same WordPress installation
                const API_URL = '/wp-json/ftt/v1/register';
                
                $.ajax({
                    url: API_URL,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function(response) {
                        if (response.success && response.checkout_url) {
                            // Redirect to Stripe Checkout
                            window.location.href = response.checkout_url;
                        } else {
                            $error.text('Unexpected response from server').show();
                            $btn.prop('disabled', false).text('Start Free Trial');
                        }
                    },
                    error: function(xhr) {
                        let errorMsg = 'Sign up failed. Please try again.';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            errorMsg = xhr.responseJSON.message;
                        }
                        $error.text(errorMsg).show();
                        $btn.prop('disabled', false).text('Start Free Trial');
                    }
                });
            });
        });
    </script>
